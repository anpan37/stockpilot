<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StockPilot</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b1220">

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #0b1220;
    color: white;
}

.center {
    display:flex;
    height:100vh;
    align-items:center;
    justify-content:center;
    flex-direction:column;
}

input, select {
    padding:10px;
    margin:5px;
    width:220px;
    border-radius:8px;
    border:none;
}

button {
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
}

.hidden { display:none; }

header {
    padding:16px;
    background:#111827;
    font-weight:bold;
}

.grid {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    padding:16px;
}

.card {
    background:#1e293b;
    padding:12px;
    border-radius:12px;
}

.item {
    margin:10px 16px;
    background:#1e293b;
    padding:12px;
    border-radius:12px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="center">
    <h2>StockPilot Login</h2>

    <select id="user">
        <option value="lx13">lx13</option>
        <option value="yeti">yeti</option>
    </select>

    <input id="pin" type="password" placeholder="PIN">

    <button onclick="login()">Login</button>
    <p id="error" style="color:red"></p>
</div>

<!-- APP -->
<div id="app" class="hidden">

<header>📦 StockPilot</header>

<div class="grid">
    <div class="card">Total <div id="total">0</div></div>
    <div class="card">Low <div id="low">0</div></div>
    <div class="card">Full <div id="full">0</div></div>
    <div class="card">Fill % <div id="fill">0%</div></div>
</div>

<div style="padding:16px">

<h3>Add Item</h3>
<input id="name" placeholder="Name">
<input id="fullStock" type="number" placeholder="Max Stock">
<button onclick="addItem()">Add</button>

<h3>Items</h3>
<div id="items"></div>

</div>

</div>

<script>

/* 🔐 CONFIG */
const API = "http://100.124.28.128:8848";
const PIN = "95028";

/* LOGIN */
function login() {
    const user = document.getElementById("user").value;
    const pin = document.getElementById("pin").value;

    if ((user === "lx13" || user === "yeti") && pin === PIN) {
        document.getElementById("login").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
        load();
    } else {
        document.getElementById("error").innerText = "Wrong login!";
    }
}

/* LOAD */
async function load() {
    const items = await (await fetch(API + "/items")).json();
    const s = await (await fetch(API + "/summary")).json();

    document.getElementById("total").innerText = s.total;
    document.getElementById("low").innerText = s.low;
    document.getElementById("full").innerText = s.full;
    document.getElementById("fill").innerText = s.fillRate + "%";

    render(items);
}

/* RENDER */
function render(items) {
    const el = document.getElementById("items");
    el.innerHTML = "";

    items.forEach(i => {
        el.innerHTML += `
        <div class="item">
            <b>${i.name}</b> (${i.currentStock}/${i.fullStock})
            <br><br>
            <button onclick="update(${i.id},1)">+1</button>
            <button onclick="update(${i.id},-1)">-1</button>
            <button onclick="del(${i.id})">Delete</button>
        </div>`;
    });
}

/* ACTIONS */
async function addItem() {
    await fetch(API + "/items", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            name:name.value,
            fullStock:Number(fullStock.value)
        })
    });
    load();
}

async function update(id,delta){
    await fetch(API+"/items/"+id,{
        method:"PATCH",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({delta})
    });
    load();
}

async function del(id){
    await fetch(API+"/items/"+id,{method:"DELETE"});
    load();
}

/* PWA */
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
