<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>StockPilot</title>

<style>
body {
  margin:0;
  font-family: system-ui;
  background:#0b1220;
  color:white;
  -webkit-text-size-adjust: 100%;
}

.container {
  padding:15px;
}

input, button {
  font-size:16px; /* prevents iOS zoom */
  padding:12px;
  margin:5px 0;
  width:100%;
  border-radius:10px;
  border:none;
  box-sizing:border-box;
}

button {
  background:#3b82f6;
  color:white;
  font-weight:bold;
}

.item {
  background:#1e293b;
  padding:12px;
  margin:10px 0;
  border-radius:12px;
}

.row {
  display:flex;
  gap:10px;
}

.row button {
  flex:1;
}
</style>
</head>

<body>

<div class="container">

<h2>📦 StockPilot</h2>

<!-- LOGIN -->
<div id="loginBox">
  <input id="user" placeholder="username">
  <input id="pin" type="password" placeholder="pin">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<h3>Add Item</h3>

<input id="name" placeholder="Item name">
<input id="fullStock" type="number" placeholder="Max stock">
<button id="addBtn">Add Item</button>

<h3>Items</h3>
<div id="items"></div>

</div>

</div>

<script>

const API = "https://stockpilot-50wv.onrender.com";
const PIN = "95028";

////////////////////////////////////////////////////
// LOGIN
////////////////////////////////////////////////////
function login() {
  const user = document.getElementById("user").value;
  const pin = document.getElementById("pin").value;

  if ((user === "lx13" || user === "yeti") && pin === PIN) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("app").style.display = "block";
    load();
  } else {
    alert("Wrong login");
  }
}

////////////////////////////////////////////////////
// LOAD ITEMS
////////////////////////////////////////////////////
async function load() {
  const res = await fetch(API + "/items");
  const data = await res.json();
  render(data);
}

////////////////////////////////////////////////////
// RENDER
////////////////////////////////////////////////////
function render(items) {
  const el = document.getElementById("items");
  el.innerHTML = "";

  items.forEach(i => {
    el.innerHTML += `
      <div class="item">
        <b>${i.name}</b><br>
        ${i.currentStock} / ${i.fullStock}

        <div class="row">
          <button onclick="update(${i.id},1)">+1</button>
          <button onclick="update(${i.id},-1)">-1</button>
          <button onclick="del(${i.id})">Delete</button>
        </div>
      </div>
    `;
  });
}

////////////////////////////////////////////////////
// ADD ITEM (AUTO CLEAR FIX)
////////////////////////////////////////////////////
document.getElementById("addBtn").addEventListener("click", async () => {

  const name = document.getElementById("name").value;
  const fullStock = document.getElementById("fullStock").value;

  if (!name || !fullStock) {
    alert("Fill all fields");
    return;
  }

  await fetch(API + "/items", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name,
      fullStock: Number(fullStock)
    })
  });

  // ✅ CLEAR INPUTS AFTER ADD (your request)
  document.getElementById("name").value = "";
  document.getElementById("fullStock").value = "";

  load();
});

////////////////////////////////////////////////////
// UPDATE STOCK
////////////////////////////////////////////////////
async function update(id, delta) {
  await fetch(API + "/items/" + id, {
    method:"PATCH",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ delta })
  });

  load();
}

////////////////////////////////////////////////////
// DELETE
////////////////////////////////////////////////////
async function del(id) {
  await fetch(API + "/items/" + id, {
    method:"DELETE"
  });

  load();
}

</script>

</body>
</html>
