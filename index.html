<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockPilot</title>

<style>
body {
  margin:0;
  font-family: system-ui;
  background:#0b1220;
  color:white;
}

input, button {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button {
  background:#3b82f6;
  color:white;
}

.item {
  background:#1e293b;
  margin:10px;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>StockPilot</h2>

<!-- LOGIN -->
<div id="login">
  <input id="user" placeholder="username">
  <input id="pin" type="password" placeholder="pin">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<h3>Add Item</h3>

<input id="name" placeholder="name">
<input id="fullStock" type="number" placeholder="max stock">
<button id="addBtn">Add</button>

<h3>Items</h3>
<div id="items"></div>

</div>

<script>

/////////////////////////////////////////////////////
// 🔥 IMPORTANT: CHANGE THIS TO YOUR RENDER URL
/////////////////////////////////////////////////////

const API = "https://stockpilot-50wv.onrender.com";

const PIN = "95028";

/////////////////////////////////////////////////////

function login() {
  const user = document.getElementById("user").value;
  const pin = document.getElementById("pin").value;

  if ((user === "lx13" || user === "yeti") && pin === PIN) {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    load();
  } else {
    alert("wrong login");
  }
}

/////////////////////////////////////////////////////

async function load() {
  const res = await fetch(API + "/items");
  const data = await res.json();
  render(data);
}

/////////////////////////////////////////////////////

function render(items) {
  const el = document.getElementById("items");
  el.innerHTML = "";

  items.forEach(i => {
    el.innerHTML += `
      <div class="item">
        <b>${i.name}</b><br>
        ${i.currentStock}/${i.fullStock}
        <br><br>

        <button onclick="update(${i.id}, 1)">+1</button>
        <button onclick="update(${i.id}, -1)">-1</button>
        <button onclick="del(${i.id})">delete</button>
      </div>
    `;
  });
}

/////////////////////////////////////////////////////

document.getElementById("addBtn").addEventListener("click", async () => {
  const name = document.getElementById("name").value;
  const fullStock = document.getElementById("fullStock").value;

  await fetch(API + "/items", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name,
      fullStock: Number(fullStock)
    })
  });

  load();
});

/////////////////////////////////////////////////////

async function update(id, delta) {
  await fetch(API + "/items/" + id, {
    method:"PATCH",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ delta })
  });

  load();
}

/////////////////////////////////////////////////////

async function del(id) {
  await fetch(API + "/items/" + id, {
    method:"DELETE"
  });

  load();
}

/////////////////////////////////////////////////////

</script>

</body>
</html>
